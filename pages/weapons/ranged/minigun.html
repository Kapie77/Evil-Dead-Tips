<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minigun</title>

<link rel="stylesheet" href="../../../css/weaponpage.css">
<link rel="stylesheet" href="../../../css/backbutton.css">
<link rel="stylesheet" href="../../../css/flag.css">

<!-- Three.js -->
<script type="module" src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/OrbitControls.js"></script>

<style>
#minigun-3d {
  width: 100%;
  height: 500px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.3);
  margin-bottom: 20px;
}
.voice-line {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,200,255,0.05);
  padding: 8px 12px;
  border-radius: 6px;
  margin-bottom: 6px;
}
.voice-line img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}
</style>
</head>
<body>

<div class="lang-switch">
  <img src="../../../images/flags/br.jpg" onclick="setLang('pt')">
  <img src="../../../images/flags/us.png" onclick="setLang('en')">
  <img src="../../../images/flags/es.jpg" onclick="setLang('es')">
</div>

<div class="overlay"></div>

<header>
  <h1 data-lang="minigun">MINIGUN</h1>
  <p data-lang="minigundesc">Pull the trigger, feel the power, send them back to hell.</p>
</header>

<main class="container">

  <!-- Modelo 3D -->
  <section id="minigun-3d"></section>

  <!-- FALA DOS PERSONAGENS -->
  <section class="weapon-voice-lines">
    <h2 data-lang="voice_lines">Voice Lines</h2>

    <div class="voice-line">
      <img src="../../../images/characters/Kelly.png" alt="Kelly Maxwell">
      <p><strong>Kelly Maxwell:</strong> These things are dangerous</p>
    </div>

    <div class="voice-line">
      <img src="../../../images/characters/Kelly.png" alt="Kelly Maxwell">
      <p><strong>Kelly Maxwell:</strong> Yeah you want some more?</p>
    </div>

    <div class="voice-line">
      <img src="../../../images/characters/AshHunter.png" alt="Ash Williams">
      <p><strong>Ash Williams (Evil Dead 2):</strong> Eat lead.</p>
    </div>

    <div class="voice-line">
      <img src="../../../images/characters/AshSupport.png" alt="Ash Williams">
      <p><strong>Ash Williams (The Evil Dead):</strong> Mmm. Heavy.</p>
    </div>

    <div class="voice-line">
      <img src="../../../images/characters/AshWarrior.png" alt="Ash Williams">
      <p><strong>Ash Williams (Army of Darkness):</strong> Hey baby!</p>
    </div>

  </section>

</main>

<button onclick="goBack()" class="back-btn" data-lang="back">Voltar</button>

<!------- SCRIPT MODELO 3D ---------->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

import { GLTFLoader }
from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/loaders/GLTFLoader.js';

import { OrbitControls }
from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js';

const container = document.getElementById('minigun-3d');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  container.clientWidth / container.clientHeight,
  0.1,
  1000
);

camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(
  container.clientWidth,
  container.clientHeight
);

container.appendChild(renderer.domElement);

// luz
const ambient = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 2);
directional.position.set(5, 5, 5);
scene.add(directional);

// controles
const controls = new OrbitControls(
  camera,
  renderer.domElement
);

controls.enableDamping = true;
controls.autoRotate = true;

// loader
const loader = new GLTFLoader();

loader.load(
  './models/Minigun.glb',

  function(gltf) {

    const model = gltf.scene;

    model.scale.set(1.5, 1.5, 1.5);

    model.position.set(0, -1, 0);

    scene.add(model);
  },

  undefined,

  function(error) {
    console.error(error);
  }
);

// render
function animate() {

  requestAnimationFrame(animate);

  controls.update();

  renderer.render(scene, camera);
}

animate();
</script>
<!---------------------->

<script src="../../../js/script.js"></script>
<script src="../../../js/lang.js"></script>
</body>
</html>
